name: Weekly Options Pipeline

on:
  schedule:
    # === WEEKLY ANALYSIS CADENCE ===
    # Wednesday 7:00 AM ET (12:00 UTC) — broad scan for next week
    - cron: '0 12 * * 3'
    # Friday 4:00 PM ET (21:00 UTC) — delta-aware refresh after close
    - cron: '0 21 * * 5'
    # Friday 4:30 PM ET (21:30 UTC) — grade this week's picks after expiry
    - cron: '30 21 * * 5'

    # === MONDAY ENTRY FLOW ===
    # Monday 8:00 AM ET (13:00 UTC) — final picks before open
    - cron: '0 13 * * 1'
    # Monday 10:00 AM ET (14:00 UTC) — entry confirmation (30 min after open)
    - cron: '0 14 * * 1'
    # Monday 1:00 PM ET (17:00 UTC) — midday P&L, check day-1 40% targets
    - cron: '0 17 * * 1'

    # === INTRADAY POSITION MONITORING ===
    # Tuesday 3:00 PM ET (19:00 UTC) — EOD check
    - cron: '0 19 * * 2'
    # Wednesday 3:00 PM ET (19:00 UTC) — EOD check (midweek events)
    - cron: '0 19 * * 3'
    # Thursday 10:00 AM ET (14:00 UTC) — morning check (theta accelerating)
    - cron: '0 14 * * 4'
    # Thursday 3:00 PM ET (19:00 UTC) — EOD check (last clean exit day)
    - cron: '0 19 * * 4'
    # Friday 10:00 AM ET (14:00 UTC) — morning check (assess what to close)
    - cron: '0 14 * * 5'
    # Friday 1:30 PM ET (17:30 UTC) — FINAL EXIT reminder (close by 2 PM)
    - cron: '30 17 * * 5'

    # === WEEKLY REFLECTION ===
    # Saturday 10:00 AM ET (15:00 UTC) — deep reflection
    - cron: '0 15 * * 6'

  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to run (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - wednesday
          - friday
          - monday
          - confirm
          - monitor
          - final_exit
          - scorecard
          - reflect

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY=${{ secrets.FRED_API_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          TRADIER_API_KEY=${{ secrets.TRADIER_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ENVEOF

      - name: Create data directories
        run: |
          mkdir -p data/candidates
          mkdir -p data/reports
          mkdir -p data/performance
          mkdir -p data/logs

      - name: Run pipeline stage
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.stage }}" = "scorecard" ]; then
            LAST_MONDAY=$(python3 -c "
          from datetime import datetime, timedelta
          today = datetime.now()
          days_back = (today.weekday() - 0) % 7
          if days_back == 0: days_back = 7
          print((today - timedelta(days=days_back)).strftime('%Y-%m-%d'))
          ")
            echo "Grading picks from ${LAST_MONDAY}..."
            python3 main.py scorecard --week "${LAST_MONDAY}" || echo "No picks to grade for ${LAST_MONDAY} — skipping"
          elif [ "${{ github.event.inputs.stage }}" = "reflect" ]; then
            echo "Running weekly reflection..."
            python3 main.py reflect
          elif [ -n "${{ github.event.inputs.stage }}" ]; then
            echo "Running manual stage: ${{ github.event.inputs.stage }}"
            python3 main.py stage --stage ${{ github.event.inputs.stage }}
          else
            # Auto-detect based on day of week and time
            DOW=$(date +%u)
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$DOW" = "1" ]; then
              if [ "$HOUR" -ge 17 ]; then
                echo "Monday 1 PM ET — midday position check..."
                python3 main.py stage --stage monitor
              elif [ "$HOUR" -ge 14 ]; then
                echo "Monday 10 AM ET — entry confirmation..."
                python3 main.py stage --stage confirm
              else
                echo "Monday 8 AM ET — generating picks..."
                python3 main.py stage --stage monday
              fi
            elif [ "$DOW" = "2" ] || [ "$DOW" = "3" ] || [ "$DOW" = "4" ]; then
              echo "$(date +%A) — position monitoring..."
              python3 main.py stage --stage monitor
            elif [ "$DOW" = "5" ]; then
              if [ "$HOUR" -ge 21 ]; then
                # After 4 PM ET — grade picks, then refresh
                LAST_MONDAY=$(python3 -c "
          from datetime import datetime, timedelta
          today = datetime.now()
          days_back = (today.weekday() - 0) % 7
          if days_back == 0: days_back = 7
          print((today - timedelta(days=days_back)).strftime('%Y-%m-%d'))
          ")
                echo "Friday close — grading picks from ${LAST_MONDAY}..."
                python3 main.py scorecard --week "${LAST_MONDAY}" || echo "No picks to grade — skipping"
                echo "Running Friday refresh..."
                python3 main.py stage --stage friday
              elif [ "$HOUR" -ge 17 ]; then
                echo "Friday 1:30 PM ET — FINAL EXIT reminder..."
                python3 main.py stage --stage final_exit
              else
                echo "Friday morning — position check..."
                python3 main.py stage --stage monitor
              fi
            elif [ "$DOW" = "6" ]; then
              echo "Saturday — running weekly reflection..."
              python3 main.py reflect
            else
              echo "No pipeline stage scheduled for today (DOW=$DOW)"
            fi
          fi

      - name: Commit and push results
        run: |
          git config user.name "weekly-options-bot"
          git config user.email "weekly-options-bot@users.noreply.github.com"
          git add data/candidates/ data/reports/ data/performance/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            DATE=$(date +%Y-%m-%d)
            DAY=$(date +%A | tr '[:upper:]' '[:lower:]')
            git commit -m "pipeline: ${DAY} results for ${DATE}"
            git push
          fi
