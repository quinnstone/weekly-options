name: Weekly Options Pipeline

on:
  schedule:
    # === WEEKLY ANALYSIS CADENCE ===
    # Wednesday 7:00 AM ET (11:00 UTC, no DST / 12:00 UTC in winter)
    - cron: '0 11 * * 3'
    # Friday 4:00 PM ET (20:00 UTC) — delta-aware refresh after close
    - cron: '0 20 * * 5'
    # Friday 4:30 PM ET (20:30 UTC) — grade this week's picks after expiry
    - cron: '30 20 * * 5'

    # === MONDAY ENTRY FLOW ===
    # Monday 8:00 AM ET (12:00 UTC) — final picks before open
    - cron: '0 12 * * 1'
    # Monday 8:15 AM ET (12:15 UTC) — backup picks cron. Off-the-hour slot is
    # statistically less contested than top-of-hour. Whichever fires first
    # runs picks; the second one finds today's picks already exist and exits
    # early (idempotency check in pipeline/stages.py monday_picks).
    - cron: '15 12 * * 1'
    # Monday 10:00 AM ET (14:00 UTC) — entry confirmation (30 min after open)
    - cron: '0 14 * * 1'
    # Monday 1:00 PM ET (17:00 UTC) — midday position check
    - cron: '0 17 * * 1'

    # === INTRADAY POSITION MONITORING ===
    # Tuesday 3:00 PM ET (19:00 UTC)
    - cron: '0 19 * * 2'
    # Wednesday 3:00 PM ET (19:00 UTC) — after scan completes
    - cron: '0 19 * * 3'
    # Thursday 10:00 AM ET (14:00 UTC) — theta accelerating
    - cron: '0 14 * * 4'
    # Thursday 3:00 PM ET (19:00 UTC) — last clean exit day
    - cron: '0 19 * * 4'
    # Friday 10:00 AM ET (14:00 UTC) — morning check
    - cron: '0 14 * * 5'
    # Friday 1:30 PM ET (17:30 UTC) — FINAL EXIT
    - cron: '30 17 * * 5'

    # === WEEKLY REFLECTION ===
    # Saturday 10:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 6'

  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to run (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - wednesday
          - friday
          - monday
          - confirm
          - monitor
          - final_exit
          - scorecard
          - reflect

permissions:
  contents: write

env:
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
  REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
  REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
  REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
  REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
  TZ: America/New_York

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: |
            data/candidates
            data/reports
            data/performance
          key: pipeline-data-${{ github.run_number }}
          restore-keys: |
            pipeline-data-

      - name: Create data directories
        run: |
          mkdir -p data/candidates
          mkdir -p data/reports
          mkdir -p data/performance
          mkdir -p data/logs

      - name: Determine stage to run
        id: stage
        run: |
          # PRIORITY 1: explicit manual dispatch wins
          if [ -n "${{ github.event.inputs.stage }}" ]; then
            echo "stage=${{ github.event.inputs.stage }}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: ${{ github.event.inputs.stage }}"
            exit 0
          fi

          # PRIORITY 2: route directly from the cron expression that triggered
          # this run (via github.event.schedule). This is the canonical mapping —
          # each cron string maps to exactly one stage, regardless of when the
          # event actually fires. This prevents the 2026-05-11 failure where a
          # late-firing 12:00 UTC Monday cron got auto-detected as `confirm`
          # because HOUR was past 10 by the time it ran. See
          # memory/project_cron_routing_failure.md.
          SCHED="${{ github.event.schedule }}"
          if [ -n "$SCHED" ]; then
            case "$SCHED" in
              "0 11 * * 3")   STAGE=wednesday ;;
              "0 20 * * 5")   STAGE=friday_close ;;
              "30 20 * * 5")  STAGE=scorecard ;;
              "0 12 * * 1")   STAGE=monday ;;
              "15 12 * * 1")  STAGE=monday ;;
              "0 14 * * 1")   STAGE=confirm ;;
              "0 17 * * 1")   STAGE=monitor ;;
              "0 19 * * 2")   STAGE=monitor ;;
              "0 19 * * 3")   STAGE=monitor ;;
              "0 14 * * 4")   STAGE=monitor ;;
              "0 19 * * 4")   STAGE=monitor ;;
              "0 14 * * 5")   STAGE=monitor ;;
              "30 17 * * 5")  STAGE=final_exit ;;
              "0 14 * * 6")   STAGE=reflect ;;
              *)              STAGE=none ;;
            esac
            echo "Cron-routed: schedule='$SCHED' → stage='$STAGE'"
            echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PRIORITY 3: legacy wall-clock auto-detect (defensive fallback if
          # github.event.schedule is somehow unavailable). Kept for safety;
          # in normal operation neither prior path falls through here.
          DOW=$(date +%u)
          HOUR=$(date +%H)
          echo "Wall-clock fallback: Day=$DOW Hour=$HOUR (ET)"

          if [ "$DOW" = "1" ]; then
            if [ "$HOUR" -ge 13 ]; then
              echo "stage=monitor" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" -ge 10 ]; then
              echo "stage=confirm" >> "$GITHUB_OUTPUT"
            else
              echo "stage=monday" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$DOW" = "2" ] || [ "$DOW" = "4" ]; then
            echo "stage=monitor" >> "$GITHUB_OUTPUT"
          elif [ "$DOW" = "3" ]; then
            if [ "$HOUR" -ge 15 ]; then
              echo "stage=monitor" >> "$GITHUB_OUTPUT"
            else
              echo "stage=wednesday" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$DOW" = "5" ]; then
            if [ "$HOUR" -ge 16 ]; then
              echo "stage=friday_close" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" -ge 13 ]; then
              echo "stage=final_exit" >> "$GITHUB_OUTPUT"
            else
              echo "stage=monitor" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$DOW" = "6" ]; then
            echo "stage=reflect" >> "$GITHUB_OUTPUT"
          else
            echo "stage=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        if: steps.stage.outputs.stage != 'none'
        run: |
          STAGE="${{ steps.stage.outputs.stage }}"
          echo "========================================="
          echo "Running stage: ${STAGE}"
          echo "Time: $(date)"
          echo "========================================="

          case "$STAGE" in
            wednesday)
              python3 main.py stage --stage wednesday
              ;;
            friday)
              python3 main.py stage --stage friday
              ;;
            monday)
              python3 main.py stage --stage monday
              ;;
            confirm)
              python3 main.py stage --stage confirm
              ;;
            monitor)
              python3 main.py stage --stage monitor
              ;;
            final_exit)
              python3 main.py stage --stage final_exit
              ;;
            friday_close)
              # Grade this week's picks, then run Friday refresh for next week
              LAST_MONDAY=$(python3 -c "
          from datetime import datetime, timedelta
          today = datetime.now()
          days_back = (today.weekday() - 0) % 7
          if days_back == 0: days_back = 7
          print((today - timedelta(days=days_back)).strftime('%Y-%m-%d'))
          ")
              echo "Grading picks from ${LAST_MONDAY}..."
              python3 main.py scorecard --week "${LAST_MONDAY}" || echo "No picks to grade — skipping"
              echo "Running Friday refresh..."
              python3 main.py stage --stage friday
              ;;
            scorecard)
              LAST_MONDAY=$(python3 -c "
          from datetime import datetime, timedelta
          today = datetime.now()
          days_back = (today.weekday() - 0) % 7
          if days_back == 0: days_back = 7
          print((today - timedelta(days=days_back)).strftime('%Y-%m-%d'))
          ")
              python3 main.py scorecard --week "${LAST_MONDAY}" || echo "No picks to grade — skipping"
              ;;
            reflect)
              python3 main.py reflect
              ;;
          esac

      - name: Commit and push results
        if: steps.stage.outputs.stage != 'none'
        run: |
          git config user.name "weekly-options-bot"
          git config user.email "weekly-options-bot@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          # Scope BOTH candidate-dir and reports add to TODAY's date so
          # cache-restored files from prior dates can't silently re-commit
          # stale data and revert manual backfills. Each pipeline stage
          # writes only to data/candidates/{TODAY}/ and (for monday_picks
          # / monday_entry_confirmation) data/reports/{TODAY}_picks.json.
          # data/performance/ stays wholesale — files there are running
          # stats / scorecard outputs that legitimately span dates.
          # Pre-create today's candidates dir so git add doesn't fail under
          # `bash -e` for stages (reflect, scorecard) that write only to
          # data/performance/. git ignores empty dirs, so this is a safe no-op.
          mkdir -p "data/candidates/${DATE}"
          git add "data/candidates/${DATE}/" data/performance/
          # reports file may not exist for stages that only write performance/
          if [ -f "data/reports/${DATE}_picks.json" ]; then
            git add "data/reports/${DATE}_picks.json"
          fi
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            STAGE="${{ steps.stage.outputs.stage }}"
            git commit -m "pipeline: ${STAGE} results for ${DATE}"
            git push
          fi
